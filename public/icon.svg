<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: Deepest Black with a hint of Dark Crimson -->
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="50%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="#1a0505" />
      <stop offset="100%" stop-color="#020202" />
    </radialGradient>
    
    <!-- Passion Red Metallic Gradient -->
    <linearGradient id="passion_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="50%" stop-color="#E60000" />
      <stop offset="100%" stop-color="#990000" />
    </linearGradient>
    
    <!-- Gold Metallic Gradient -->
    <linearGradient id="gold_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E1A4" />
      <stop offset="45%" stop-color="#D4AF37" />
      <stop offset="55%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>

    <!-- Luxury Shadow/Glow -->
    <filter id="luxury_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur" />
      <feFlood flood-color="#E60000" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Rectangle (App Icon Shape) -->
  <rect width="512" height="512" rx="140" fill="url(#bg_grad)" />
  
  <!-- Subtle Outer Rim -->
  <rect x="8" y="8" width="496" height="496" rx="136" stroke="url(#gold_grad)" stroke-width="2" stroke-opacity="0.1" />

  <!-- Main Isotype Container -->
  <g filter="url(#luxury_glow)">
    <!-- The Diamond/Shield Base -->
    <path d="M256 80L410 256L256 432L102 256L256 80Z" fill="url(#passion_grad)" fill-opacity="0.1" stroke="url(#gold_grad)" stroke-width="1" />
    
    <!-- Stylized Modern 'P' -->
    <!-- Vertical Bar -->
    <path d="M190 150V362" stroke="url(#passion_grad)" stroke-width="48" stroke-linecap="round" />
    
    <!-- Gold Accent Line in the Bar -->
    <path d="M190 170V342" stroke="url(#gold_grad)" stroke-width="2" stroke-opacity="0.5" />

    <!-- The Curve -->
    <path d="M190 150H290C345.228 150 390 194.772 390 250C390 305.228 345.228 350 290 350H190" 
          stroke="url(#passion_grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Gold Geometric Detail -->
    <path d="M260 210L320 250L260 290" stroke="url(#gold_grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Bottom Accent -->
  <path d="M230 460H282" stroke="url(#gold_grad)" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6" />
</svg>
