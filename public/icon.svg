<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Deep Crimson to Black -->
    <radialGradient id="bg_grad" cx="50%" cy="30%" r="80%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#2e0b0b" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    
    <!-- Passion Red Metallic Gradient -->
    <linearGradient id="passion_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="50%" stop-color="#E60000" />
      <stop offset="100%" stop-color="#8B0000" />
    </linearGradient>
    
    <!-- Gold Metallic Gradient for accents -->
    <linearGradient id="gold_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E1A4" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="passion_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feFlood flood-color="#E60000" flood-opacity="0.4" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg_grad)" />
  
  <!-- Main Icon: Stylized 'P' with Chat Bubble element -->
  <g filter="url(#passion_glow)">
    <!-- The 'P' stem -->
    <rect x="180" y="140" width="40" height="232" rx="20" fill="url(#passion_grad)" />
    
    <!-- The 'P' loop / Chat bubble shape -->
    <path d="M180 140H300C355.228 140 400 184.772 400 240C400 295.228 355.228 340 300 340H220L160 380V340H180V140Z" 
          fill="url(#passion_grad)" fill-rule="evenodd" clip-rule="evenodd" />
    
    <!-- Inner cutout for the 'P' loop -->
    <circle cx="290" cy="240" r="45" fill="#050505" opacity="0.6" />
  </g>
  
  <!-- Subtle Outer Gold Border -->
  <rect x="15" y="15" width="482" height="482" rx="120" stroke="url(#gold_grad)" stroke-width="4" stroke-opacity="0.3" />
</svg>
