<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtros de Realismo Extremo -->
    <filter id="priveGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="rubyBling" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feSpecularLighting surfaceScale="8" specularConstant="1.2" specularExponent="35" lighting-color="#ffffff" in="blur" result="spec">
        <fePointLight x="300" y="200" z="400" />
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
    </filter>

    <filter id="goldReflection" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feSpecularLighting surfaceScale="5" specularConstant="1" specularExponent="50" lighting-color="#FFE082" in="blur" result="spec">
        <fePointLight x="512" y="100" z="500" />
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic" k1="0" k2="1" k3="0.8" k4="0" />
    </filter>

    <!-- Gradientes Complejos -->
    <linearGradient id="priveGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4" />
      <stop offset="20%" stop-color="#F9A825" />
      <stop offset="45%" stop-color="#FFD54F" />
      <stop offset="55%" stop-color="#E65100" />
      <stop offset="75%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#B26500" />
    </linearGradient>

    <radialGradient id="priveRuby" cx="40%" cy="30%" r="70%" fx="40%" fy="30%">
      <stop offset="0%" stop-color="#FF5252" />
      <stop offset="40%" stop-color="#C62828" />
      <stop offset="85%" stop-color="#800000" />
      <stop offset="100%" stop-color="#330000" />
    </radialGradient>

    <radialGradient id="neonLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Aura de Neón Ambiental -->
  <circle cx="512" cy="512" r="450" fill="url(#neonLight)" opacity="0.35" />

  <!-- Escudo de Cristal (Base Izquierda) -->
  <g filter="url(##rubyBling)">
    <!-- Marco de Oro del Escudo -->
    <path d="M220 250 C220 150, 400 110, 512 150 C624 110, 804 150, 804 250 V570 C804 770, 512 890, 512 890 L220 570 V250Z" fill="url(#priveGold)" />
    <!-- Cristal Rubí Interno -->
    <path d="M250 270 C250 180, 410 145, 512 180 C614 145, 774 180, 774 270 V550 C774 720, 512 850, 512 850 L250 550 V270Z" fill="url(#priveRuby)" />
    
    <!-- Facetas de Cristal -->
    <path d="M512 180 L774 270 L512 512 Z" fill="white" fill-opacity="0.08" />
    <path d="M250 270 L512 180 L512 512 Z" fill="white" fill-opacity="0.04" />
    <path d="M250 270 L250 550 L512 512 Z" fill="black" fill-opacity="0.15" />
    <path d="M774 270 L774 550 L512 512 Z" fill="black" fill-opacity="0.1" />
  </g>

  <!-- Letra 'P' (Tubular Neón + Oro) -->
  <g filter="url(#priveGlow)">
    <!-- Contorno de Oro -->
    <path d="M520 300 H680 C760 300, 760 480, 680 480 H520 V720" stroke="url(#priveGold)" stroke-width="28" stroke-linecap="round" fill="none" filter="url(#goldReflection)" />
    <!-- Núcleo de Neón Rojo -->
    <path d="M520 300 H680 C760 300, 760 480, 680 480 H520 V720" stroke="#FF5252" stroke-width="8" stroke-linecap="round" fill="none" />
  </g>

  <!-- Candado de Grado Empresarial (Foco Central) -->
  <g transform="translate(430, 450)" filter="url(#rubyBling)">
    <!-- Arco de Oro (Abierto/Cerrado visualmente integrado) -->
    <path d="M25 40 V15 C25 -25, 105 -25, 105 15 V40" fill="none" stroke="url(#priveGold)" stroke-width="22" stroke-linecap="round" filter="url(#goldReflection)" />
    <!-- Cuerpo de Cristal con Marco de Oro -->
    <rect x="0" y="30" width="130" height="150" rx="15" fill="url(#priveRuby)" stroke="url(#priveGold)" stroke-width="12" />
    
    <!-- Keyhole Dorado -->
    <g transform="translate(65, 105)">
      <circle r="15" fill="#1A0000" />
      <path d="M-6 12 L6 12 L0 -4 Z" fill="url(#priveGold)" transform="rotate(180)" />
      <circle r="6" fill="url(#priveGold)" cy="-5" />
    </g>
  </g>

  <!-- Reflejos Finales de Alta Gama -->
  <path d="M300 300 Q400 250, 500 300" stroke="white" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round" fill="none" />
  <path d="M600 320 Q700 300, 750 350" stroke="white" stroke-width="8" stroke-opacity="0.3" stroke-linecap="round" fill="none" />
</svg>
