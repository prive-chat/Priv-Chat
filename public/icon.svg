<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Depth -->
    <radialGradient id="bg_rad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2a0505" />
      <stop offset="100%" stop-color="#020202" />
    </radialGradient>

    <!-- Ruby Glass Gradient -->
    <linearGradient id="ruby_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1a1a" />
      <stop offset="40%" stop-color="#cc0000" />
      <stop offset="100%" stop-color="#4d0000" />
    </linearGradient>

    <!-- Gold Metallic -->
    <linearGradient id="gold_metallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE08A" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F9E29C" />
      <stop offset="75%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A6008" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon_red_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur" />
      <feFlood flood-color="#ff0000" flood-opacity="0.8" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Specular Highlight for Glass -->
    <linearGradient id="glass_shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="50%" stop-color="white" stop-opacity="0.05" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Base Icon Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg_rad)" />

  <!-- The Neon Aura -->
  <g filter="url(#neon_red_glow)">
    
    <!-- Gold Borders Base Layer -->
    <!-- Shield Outline -->
    <path d="M100 120C100 120 100 280 180 380C190 395 200 405 210 415L210 100C160 100 100 100 100 120Z" 
          stroke="url(#gold_metallic)" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Padlock Outline -->
    <rect x="210" y="240" width="80" height="90" rx="4" stroke="url(#gold_metallic)" stroke-width="6" />
    <path d="M230 240V210C230 193.431 243.431 180 260 180S290 193.431 290 210V240" 
          stroke="url(#gold_metallic)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Letter P Outline -->
    <path d="M250 100H380C435.228 100 480 144.772 480 200C480 255.228 435.228 300 380 300H290V415" 
          stroke="url(#gold_metallic)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Ruby Glass Fill -->
    <!-- Shield Ruby -->
    <path d="M100 120C100 120 100 280 180 380C190 395 200 405 210 415L210 100C160 100 100 100 100 120Z" 
          fill="url(#ruby_grad)" fill-opacity="0.8" />
    
    <!-- Padlock Ruby -->
    <rect x="210" y="240" width="80" height="90" rx="4" fill="url(#ruby_grad)" fill-opacity="0.9" />
    
    <!-- P Ruby -->
    <path d="M260 100H380C435.228 100 480 144.772 480 200C480 255.228 435.228 300 380 300H290L290 415L260 415V100Z" 
          fill="url(#ruby_grad)" fill-opacity="0.8" />

    <!-- Glass Highlights (Shine) -->
    <path d="M115 130C115 130 115 250 180 340" stroke="url(#glass_shine)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.6" />
    <rect x="215" y="245" width="70" height="40" rx="2" fill="url(#glass_shine)" fill-opacity="0.2" />
    <path d="M300 115H380C420 115 455 145 455 200" stroke="url(#glass_shine)" stroke-width="12" stroke-linecap="round" stroke-opacity="0.5" />

    <!-- Keyhole Detail -->
    <circle cx="250" cy="275" r="8" fill="#1a0000" />
    <path d="M250 280V295" stroke="#1a0000" stroke-width="6" stroke-linecap="round" />
    
    <!-- Internal Gold Guiding Lines -->
    <path d="M250 135V365" stroke="url(#gold_metallic)" stroke-width="2" stroke-opacity="0.4" />
    <path d="M300 140H380C410 140 435 165 435 200C435 235 410 260 380 260H290" 
          stroke="url(#gold_metallic)" stroke-width="2" fill="none" stroke-opacity="0.4" />

  </g>
</svg>
