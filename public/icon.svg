<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes de Material -->
    <linearGradient id="goldBevel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFACD" />
      <stop offset="20%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#B8860B" />
      <stop offset="80%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#8B4513" />
    </linearGradient>

    <radialGradient id="rubyGlass" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="60%" stop-color="#990000" />
      <stop offset="100%" stop-color="#4D0000" />
    </radialGradient>

    <radialGradient id="neonCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF0000" />
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0" />
    </radialGradient>

    <!-- Filtros de realismo -->
    <filter id="volumetric" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feSpecularLighting surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#white" in="blur" result="spec">
        <fePointLight x="100" y="100" z="200" />
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Brillo de Neón Externo (Ambiental) -->
  <circle cx="256" cy="256" r="220" fill="url(#neonCore)" opacity="0.3" filter="blur(30px)" />

  <!-- Escudo Base (Facetado) -->
  <g filter="url(#volumetric)">
    <!-- Marco de Oro del Escudo -->
    <path d="M120 120 C120 70, 200 50, 256 70 C312 50, 392 70, 392 120 V280 C392 380, 256 440, 256 440 L120 280 V120Z" fill="url(#goldBevel)" />
    <!-- Cuerpo de Cristal Principal -->
    <path d="M135 130 C135 90, 205 75, 256 90 C307 75, 377 90, 377 130 V270 C377 350, 256 415, 256 415 L135 270 V130Z" fill="url(#rubyGlass)" stroke="#000" stroke-width="0.5" />
    
    <!-- Facetas Internas del Cristal -->
    <path d="M256 90 L377 130 L256 256 L135 130 Z" fill="white" fill-opacity="0.05" />
    <path d="M135 130 L135 270 L256 256 Z" fill="black" fill-opacity="0.15" />
    <path d="M377 130 L377 270 L256 256 Z" fill="white" fill-opacity="0.1" />
    <path d="M135 270 L256 415 L256 256 Z" fill="black" fill-opacity="0.2" />
    <path d="M377 270 L256 415 L256 256 Z" fill="white" fill-opacity="0.05" />
  </g>

  <!-- Letra 'P' Volumétrica (Neón) -->
  <g filter="url(#glow)">
    <!-- Bordes de Oro de la 'P' -->
    <path d="M246 140 H310 C345 140, 345 230, 310 230 H246 V340" stroke="url(#goldBevel)" stroke-width="14" stroke-linecap="round" fill="none" />
    <!-- Núcleo de Neón Rojo -->
    <path d="M246 140 H310 C345 140, 345 230, 310 230 H246 V340" stroke="#FF3131" stroke-width="4" stroke-linecap="round" fill="none" />
  </g>

  <!-- El Candado Integrado (Foco central) -->
  <g transform="translate(230, 240)" filter="url(#volumetric)">
    <!-- Arco de Oro -->
    <path d="M10 15 V0 C10 -15, 42 -15, 42 0 V15" fill="none" stroke="url(#goldBevel)" stroke-width="8" stroke-linecap="round" />
    <!-- Cuerpo de Cristal Rubí -->
    <rect x="0" y="10" width="52" height="60" rx="6" fill="url(#rubyGlass)" stroke="url(#goldBevel)" stroke-width="4" />
    <!-- Ojo de Cerradura Dorado -->
    <circle cx="26" cy="40" r="6" fill="#000" />
    <path d="M26 44 L26 55 L32 55 L20 55 L26 44Z" fill="url(#goldBevel)" />
  </g>

  <!-- Reflejos de Brillo Final -->
  <path d="M150 140 Q180 120, 220 140" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round" />
  <path d="M320 150 Q340 145, 360 160" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round" />
</svg>
